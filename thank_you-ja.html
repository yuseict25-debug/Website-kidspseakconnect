<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ありがとうございます！ - KidsSpeakConnect</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Open+Sans:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="assets/logo.png">
</head>

<body>
    <div id="header-placeholder"></div>

    <header class="page-header section text-center">
        <div class="container">
            <h1 class="page-title">ありがとうございます！</h1>
            <p class="page-subtitle">お問い合わせを受け付けました。</p>
        </div>
    </header>

    <section class="section text-center">
        <div class="container" style="max-width: 600px;">
            <div
                style="background: white; padding: 4rem 2rem; border-radius: var(--radius-xl); box-shadow: var(--shadow-lg);">
                <div class="mb-6">
                    <i class="fas fa-check-circle fa-5x" style="color: #48BB78;"></i>
                </div>
                <h2 class="mb-4">メッセージ送信完了</h2>
                <p class="mb-4" style="font-size: 1.1rem; color: #4A5568;">
                    KidsSpeakConnectにお問い合わせいただきありがとうございます！私たちのチームが内容を確認し、できるだけ早くお返事いたします。
                </p>
                <div
                    style="background: #ebf8ff; padding: 1.5rem; border-radius: var(--radius-md); margin-bottom: 2rem; border-left: 4px solid #3182ce; text-align: left;">
                    <p style="margin-bottom: 0.5rem; font-weight: 700; color: #2c5282;">
                        <i class="fas fa-envelope-open-text mr-2"></i> 受信トレイをご確認ください
                    </p>
                    <p style="font-size: 0.95rem; color: #2a4365; line-height: 1.5;">
                        確認メールを送信しました。1〜2分以内に届かない場合は、<strong>迷惑メールフォルダ</strong>をご確認ください。
                    </p>
                </div>
                <a href="index-ja.html" class="btn btn-primary">ホームページに戻る</a>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>
    <script src="js/main.js"></script>
</body>

</html>
