<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ - KidsSpeakConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="assets/logo.png">
</head>
<body>
    <div id="header-placeholder"></div>

    <header class="page-header section bg-light text-center">
        <div class="container">
            <h1 class="page-title">お問い合わせ</h1>
        </div>
    </header>

    <section class="section" style="padding-top: 1rem;">
        <div class="container text-center" style="max-width: 900px;">
            <p class="mb-8" style="font-size: 1.4rem; line-height: 1.6;">ご質問がある場合やワークショップに参加したい場合は、メールまたはInstagramでお気軽にお問い合わせください！リクエストに応じてワークショップやレッスンも開催していますので、私たちのサービスに興味がある方はお気軽にご連絡ください！</p>

            <div style="display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap;">
                <div style="background:#fff; padding:2rem; border-radius:var(--radius-lg); box-shadow:var(--shadow-md); flex: 1; min-width: 300px;">
                    <h3><i class="fa-solid fa-envelope" style="margin-right: 0.5rem; color: #DB4437;"></i> メール</h3>
                    <p style="font-size:1.2rem; margin-top:0.5rem;"><a href="mailto:kidsspeakconnect@gmail.com">kidsspeakconnect@gmail.com</a></p>
                </div>

                <div style="background:#fff; padding:2rem; border-radius:var(--radius-lg); box-shadow:var(--shadow-md); flex: 1; min-width: 300px;">
                    <h3><i class="fa-brands fa-instagram" style="margin-right: 0.5rem; color: #E1306C;"></i> Instagram</h3>
                    <p style="font-size:1.2rem; margin-top:0.5rem;"><a href="https://instagram.com/kidspeak.connect" target="_blank">@kidspeak.connect</a></p>
                </div>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>
    <script src="js/main.js"></script>
</body>
</html>
