<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>応募する - KidsSpeakConnect</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Open+Sans:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="assets/logo.png">
</head>

<body>
    <div id="header-placeholder"></div>

    <header class="page-header section bg-light text-center">
        <div class="container">
            <h1 class="page-title">サービスにご興味がありますか？</h1>
            <p class="page-subtitle">ご連絡をお待ちしております！</p>
        </div>
    </header>

    <section class="section">
        <div class="container" style="max-width: 700px;">
            <div id="form-container" class="inquiry-container">
                <form action="https://formsubmit.co/kidsspeakconnect@gmail.com" method="POST" class="inquiry-form">
                    <!-- config for formsubmit -->
                    <input type="hidden" name="_subject" value="New Inquiry from KidsSpeakConnect! (Japanese)">
                    <input type="hidden" name="_template" value="table">
                    <input type="hidden" name="_autoresponse"
                        value="お問い合わせありがとうございます！メッセージを受け取りました。担当者よりできるだけ早くお返事いたします。KidsSpeakConnectでお会いできるのを楽しみにしています！">
                    <input type="hidden" name="_next" id="next-field" value="">

                    <div class="form-group">
                        <label for="name">お名前</label>
                        <input type="text" id="name" name="name" placeholder="山田 太郎" required>
                    </div>

                    <div class="form-group">
                        <label for="email">メールアドレス</label>
                        <input type="email" id="email" name="email" placeholder="taro@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="message">お問い合わせ内容</label>
                        <textarea id="message" name="message" rows="5" placeholder="お手伝いできることを教えてください..."
                            required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">
                        送信する &rarr;
                    </button>
                </form>
            </div>
        </div>
    </section>

    <style>
        .inquiry-container {
            background: #fff;
            padding: 3rem;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            border-top: 5px solid var(--color-primary);
            transition: all 0.3s ease;
        }

        .inquiry-form {
            text-align: left;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-family: var(--font-heading);
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--color-text-main);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.875rem;
            border: 2px solid #edf2f7;
            border-radius: var(--radius-md);
            font-family: var(--font-body);
            font-size: 1rem;
            transition: all 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(238, 75, 75, 0.1);
        }

        .form-group textarea {
            resize: vertical;
        }

        /* SUCCESS MESSAGE STYLINE (JUST KEEP THIS FOR USAGE IN THE FUTURE) */
        .success-message {
            text-align: center;
            padding: 2rem 1rem;
            animation: fadeIn 0.5s ease;
        }

        .success-message i {
            color: #48BB78;
            font-size: 4rem;
            margin-bottom: 1.5rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

    <div id="footer-placeholder"></div>
    <script src="js/main.js"></script>
</body>

</html>
